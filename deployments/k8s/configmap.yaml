apiVersion: v1
kind: ConfigMap
metadata:
  name: quant-config
  namespace: quant-trading
data:
  QUANT_ENV: "simulation"
  TZ: "Asia/Shanghai"
  LOG_LEVEL: "info"
  SERVER_PORT: "8765"
  SERVER_HOST: "0.0.0.0"
  # Strategy settings
  STRATEGY_INTERVAL: "1m"
  RISK_MAX_DAILY_LOSS: "500"
  RISK_MAX_POSITION_VALUE: "10000"
  # LLM settings
  LLM_PROVIDER: "openai"
  LLM_MODEL: "gpt-4"
