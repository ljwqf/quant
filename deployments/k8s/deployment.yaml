apiVersion: apps/v1
kind: Deployment
metadata:
  name: quant-trader
  namespace: quant-trading
  labels:
    app: quant-trader
spec:
  replicas: 1  # Trading systems typically run single-instance
  strategy:
    type: Recreate  # No rolling updates for trading systems
  selector:
    matchLabels:
      app: quant-trader
  template:
    metadata:
      labels:
        app: quant-trader
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8765"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: quant
          image: okx-quant:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8765
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: quant-config
            - secretRef:
                name: quant-secrets
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8765
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: data
              mountPath: /app/data
            - name: logs
              mountPath: /app/logs
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: quant-data
        - name: logs
          emptyDir: {}
