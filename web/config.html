<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配置管理 - OKX量化交易系统</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        .config-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        .config-section {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .config-section h3 {
            margin-bottom: 1rem;
            color: #00d4ff;
        }
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1rem;
            margin-bottom: 1rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .form-group label {
            font-size: 0.875rem;
            color: #888;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 0.75rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #fff;
            font-size: 0.875rem;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }
        .btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
        }
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }
        .btn-danger {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
            border: 1px solid rgba(255, 68, 68, 0.3);
        }
        .alert {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            display: none;
        }
        .alert-success {
            background: rgba(0, 255, 136, 0.1);
            border: 1px solid rgba(0, 255, 136, 0.3);
            color: #00ff88;
        }
        .alert-error {
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid rgba(255, 68, 68, 0.3);
            color: #ff4444;
        }
        .nav-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }
        .nav-tab {
            padding: 0.75rem 1.5rem;
            background: rgba(255, 255, 255, 0.05);
            border: none;
            border-radius: 8px;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .nav-tab.active {
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <header class="header">
            <div class="logo">
                <h1><a href="/" style="text-decoration: none; color: inherit;">OKX量化交易系统</a></h1>
            </div>
            <div class="status-bar">
                <a href="/" class="btn btn-secondary">返回首页</a>
            </div>
        </header>

        <main class="config-container">
            <div id="alert" class="alert"></div>

            <div class="nav-tabs">
                <button class="nav-tab active" onclick="switchTab('basic')">基本配置</button>
                <button class="nav-tab" onclick="switchTab('exchange')">交易所配置</button>
                <button class="nav-tab" onclick="switchTab('risk')">风控配置</button>
                <button class="nav-tab" onclick="switchTab('strategy')">策略配置</button>
                <button class="nav-tab" onclick="switchTab('notifications')">通知配置</button>
                <button class="nav-tab" onclick="switchTab('server')">服务器配置</button>
            </div>

            <form id="config-form">
                <!-- 基本配置 -->
                <div id="tab-basic" class="tab-content active">
                    <div class="config-section">
                        <h3>基本设置</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>应用名称</label>
                                <input type="text" id="basic.app_name" name="basic.app_name">
                            </div>
                            <div class="form-group">
                                <label>运行环境</label>
                                <select id="basic.env" name="basic.env">
                                    <option value="development">开发环境</option>
                                    <option value="production">生产环境</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>日志级别</label>
                                <select id="basic.log_level" name="basic.log_level">
                                    <option value="debug">Debug</option>
                                    <option value="info">Info</option>
                                    <option value="warn">Warn</option>
                                    <option value="error">Error</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>日志文件路径</label>
                                <input type="text" id="basic.log_file" name="basic.log_file">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 交易所配置 -->
                <div id="tab-exchange" class="tab-content">
                    <div class="config-section">
                        <h3>OKX交易所配置</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>API Key</label>
                                <input type="text" id="exchange.okx.api_key" name="exchange.okx.api_key">
                            </div>
                            <div class="form-group">
                                <label>Secret Key</label>
                                <input type="password" id="exchange.okx.secret_key" name="exchange.okx.secret_key">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Passphrase</label>
                                <input type="password" id="exchange.okx.passphrase" name="exchange.okx.passphrase">
                            </div>
                            <div class="form-group">
                                <label>Base URL</label>
                                <input type="text" id="exchange.okx.base_url" name="exchange.okx.base_url">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>WebSocket URL</label>
                                <input type="text" id="exchange.okx.ws_url" name="exchange.okx.ws_url">
                            </div>
                            <div class="form-group">
                                <label>超时时间</label>
                                <input type="text" id="exchange.okx.timeout" name="exchange.okx.timeout" placeholder="例如: 30s">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>重试次数</label>
                                <input type="number" id="exchange.okx.retry_count" name="exchange.okx.retry_count">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 风控配置 -->
                <div id="tab-risk" class="tab-content">
                    <div class="config-section">
                        <h3>风险控制</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>启用风控</label>
                                <select id="risk.enable" name="risk.enable">
                                    <option value="true">启用</option>
                                    <option value="false">禁用</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>最大仓位大小 (USDT)</label>
                                <input type="number" id="risk.max_position_size" name="risk.max_position_size">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>最大日亏损 (USDT)</label>
                                <input type="number" id="risk.max_daily_loss" name="risk.max_daily_loss">
                            </div>
                            <div class="form-group">
                                <label>最大回撤 (0-1)</label>
                                <input type="number" step="0.01" id="risk.max_drawdown" name="risk.max_drawdown">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>止损百分比 (0-1)</label>
                                <input type="number" step="0.01" id="risk.stop_loss_percent" name="risk.stop_loss_percent">
                            </div>
                            <div class="form-group">
                                <label>止盈百分比 (0-1)</label>
                                <input type="number" step="0.01" id="risk.take_profit_percent" name="risk.take_profit_percent">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>每日最大交易次数</label>
                                <input type="number" id="risk.max_trades_per_day" name="risk.max_trades_per_day">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 策略配置 -->
                <div id="tab-strategy" class="tab-content">
                    <div class="config-section">
                        <h3>策略设置</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>启用策略</label>
                                <select id="strategy.enable" name="strategy.enable">
                                    <option value="true">启用</option>
                                    <option value="false">禁用</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>策略名称</label>
                                <input type="text" id="strategy.name" name="strategy.name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>策略参数 (JSON格式)</label>
                            <textarea id="strategy.params" name="strategy.params" rows="5"></textarea>
                        </div>
                    </div>
                </div>

                <!-- 服务器配置 -->
                <div id="tab-server" class="tab-content">
                    <div class="config-section">
                        <h3>服务器设置</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>启用服务器</label>
                                <select id="server.enable" name="server.enable">
                                    <option value="true">启用</option>
                                    <option value="false">禁用</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>端口</label>
                                <input type="number" id="server.port" name="server.port">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>主机</label>
                                <input type="text" id="server.host" name="server.host">
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 通知配置 -->
                <div id="tab-notifications" class="tab-content">
                    <div class="config-section">
                        <h3>通知全局设置</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>启用通知系统</label>
                                <select id="notifications.enabled" name="notifications.enabled">
                                    <option value="true">启用</option>
                                    <option value="false">禁用</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>默认通知级别</label>
                                <select id="notifications.default_level" name="notifications.default_level">
                                    <option value="debug">调试</option>
                                    <option value="info" selected>信息</option>
                                    <option value="warning">警告</option>
                                    <option value="error">错误</option>
                                    <option value="critical">严重</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="config-section">
                        <h3>控制台通知</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>启用控制台通知</label>
                                <select id="notifications.console.enabled" name="notifications.console.enabled">
                                    <option value="true">启用</option>
                                    <option value="false">禁用</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>控制台通知级别</label>
                                <select id="notifications.console.level" name="notifications.console.level">
                                    <option value="debug">调试</option>
                                    <option value="info" selected>信息</option>
                                    <option value="warning">警告</option>
                                    <option value="error">错误</option>
                                    <option value="critical">严重</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="config-section">
                        <h3>Telegram通知</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>启用Telegram通知</label>
                                <select id="notifications.telegram.enabled" name="notifications.telegram.enabled">
                                    <option value="true">启用</option>
                                    <option value="false" selected>禁用</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Telegram Bot Token</label>
                                <input type="text" id="notifications.telegram.bot_token" name="notifications.telegram.bot_token" placeholder="例如: 123456789:ABCdefGhIJKlmNoPQRsTUVwxyZ">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Chat ID</label>
                                <input type="text" id="notifications.telegram.chat_id" name="notifications.telegram.chat_id" placeholder="例如: 123456789">
                            </div>
                            <div class="form-group">
                                <label>Telegram通知级别</label>
                                <select id="notifications.telegram.level" name="notifications.telegram.level">
                                    <option value="debug">调试</option>
                                    <option value="info" selected>信息</option>
                                    <option value="warning">警告</option>
                                    <option value="error">错误</option>
                                    <option value="critical">严重</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="config-section">
                        <h3>Discord通知</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>启用Discord通知</label>
                                <select id="notifications.discord.enabled" name="notifications.discord.enabled">
                                    <option value="true">启用</option>
                                    <option value="false" selected>禁用</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Webhook URL</label>
                                <input type="text" id="notifications.discord.webhook_url" name="notifications.discord.webhook_url" placeholder="例如: https://discord.com/api/webhooks/...">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Discord通知级别</label>
                                <select id="notifications.discord.level" name="notifications.discord.level">
                                    <option value="debug">调试</option>
                                    <option value="info" selected>信息</option>
                                    <option value="warning">警告</option>
                                    <option value="error">错误</option>
                                    <option value="critical">严重</option>
                                </select>
                            </div>
                        </div>
                    </div>

                    <div class="config-section">
                        <h3>Email通知</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>启用Email通知</label>
                                <select id="notifications.email.enabled" name="notifications.email.enabled">
                                    <option value="true">启用</option>
                                    <option value="false" selected>禁用</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>SMTP服务器</label>
                                <input type="text" id="notifications.email.smtp_host" name="notifications.email.smtp_host" placeholder="例如: smtp.gmail.com">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>SMTP端口</label>
                                <input type="number" id="notifications.email.smtp_port" name="notifications.email.smtp_port" placeholder="例如: 587">
                            </div>
                            <div class="form-group">
                                <label>发件人邮箱</label>
                                <input type="email" id="notifications.email.from" name="notifications.email.from" placeholder="例如: your-email@gmail.com">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>收件人邮箱</label>
                                <input type="email" id="notifications.email.to" name="notifications.email.to" placeholder="例如: recipient@example.com">
                            </div>
                            <div class="form-group">
                                <label>SMTP用户名</label>
                                <input type="text" id="notifications.email.username" name="notifications.email.username" placeholder="例如: your-email@gmail.com">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>SMTP密码</label>
                                <input type="password" id="notifications.email.password" name="notifications.email.password" placeholder="SMTP密码或应用专用密码">
                            </div>
                            <div class="form-group">
                                <label>Email通知级别</label>
                                <select id="notifications.email.level" name="notifications.email.level">
                                    <option value="debug">调试</option>
                                    <option value="info" selected>信息</option>
                                    <option value="warning">警告</option>
                                    <option value="error">错误</option>
                                    <option value="critical">严重</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="btn-group">
                    <button type="submit" class="btn btn-primary">保存配置</button>
                    <button type="button" class="btn btn-secondary" onclick="loadConfig()">重置</button>
                    <button type="button" class="btn btn-danger" onclick="if(confirm('确定要重启系统吗？')) location.reload()">重启系统</button>
                </div>
            </form>
        </main>
    </div>

    <script>
        // 从localStorage或URL中获取API Token
        function getStoredAPIToken() {
            const urlParams = new URLSearchParams(window.location.search);
            const tokenFromUrl = urlParams.get('token');
            if (tokenFromUrl) {
                localStorage.setItem('api_token', tokenFromUrl);
                return tokenFromUrl;
            }
            return localStorage.getItem('api_token');
        }

        let apiToken = getStoredAPIToken();

        // 构建认证headers
        function buildAuthHeaders(additionalHeaders = {}) {
            const headers = { ...additionalHeaders };
            if (apiToken) {
                headers['X-API-Token'] = apiToken;
            }
            return headers;
        }

        // 切换标签页
        function switchTab(tabName) {
            document.querySelectorAll('.nav-tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // 加载配置
        async function loadConfig() {
            try {
                const response = await fetch('/api/config', {
                    headers: buildAuthHeaders()
                });
                if (!response.ok) {
                    if (response.status === 403) {
                        showAlert('访问被拒绝，请检查API Token', 'error');
                        return;
                    }
                    throw new Error('HTTP ' + response.status);
                }
                const config = await response.json();
                
                // 填充表单
                fillForm(config);
            } catch (error) {
                showAlert('加载配置失败: ' + error.message, 'error');
            }
        }

        // 填充表单
        function fillForm(config) {
            // 基本配置
            setFieldValue('basic.app_name', config.basic?.app_name);
            setFieldValue('basic.env', config.basic?.env);
            setFieldValue('basic.log_level', config.basic?.log_level);
            setFieldValue('basic.log_file', config.basic?.log_file);

            // 交易所配置
            setFieldValue('exchange.okx.api_key', config.exchange?.okx?.api_key);
            setFieldValue('exchange.okx.secret_key', config.exchange?.okx?.secret_key);
            setFieldValue('exchange.okx.passphrase', config.exchange?.okx?.passphrase);
            setFieldValue('exchange.okx.base_url', config.exchange?.okx?.base_url);
            setFieldValue('exchange.okx.ws_url', config.exchange?.okx?.ws_url);
            setFieldValue('exchange.okx.timeout', config.exchange?.okx?.timeout);
            setFieldValue('exchange.okx.retry_count', config.exchange?.okx?.retry_count);

            // 风控配置
            setFieldValue('risk.enable', config.risk?.enable);
            setFieldValue('risk.max_position_size', config.risk?.max_position_size);
            setFieldValue('risk.max_daily_loss', config.risk?.max_daily_loss);
            setFieldValue('risk.max_drawdown', config.risk?.max_drawdown);
            setFieldValue('risk.stop_loss_percent', config.risk?.stop_loss_percent);
            setFieldValue('risk.take_profit_percent', config.risk?.take_profit_percent);
            setFieldValue('risk.max_trades_per_day', config.risk?.max_trades_per_day);

            // 策略配置
            setFieldValue('strategy.enable', config.strategy?.enable);
            setFieldValue('strategy.name', config.strategy?.name);
            setFieldValue('strategy.params', JSON.stringify(config.strategy?.params || {}, null, 2));

            // 通知配置
            setFieldValue('notifications.enabled', config.notifications?.enabled);
            setFieldValue('notifications.default_level', config.notifications?.default_level);
            setFieldValue('notifications.console.enabled', config.notifications?.console?.enabled);
            setFieldValue('notifications.console.level', config.notifications?.console?.level);
            setFieldValue('notifications.telegram.enabled', config.notifications?.telegram?.enabled);
            setFieldValue('notifications.telegram.bot_token', config.notifications?.telegram?.bot_token);
            setFieldValue('notifications.telegram.chat_id', config.notifications?.telegram?.chat_id);
            setFieldValue('notifications.telegram.level', config.notifications?.telegram?.level);
            setFieldValue('notifications.discord.enabled', config.notifications?.discord?.enabled);
            setFieldValue('notifications.discord.webhook_url', config.notifications?.discord?.webhook_url);
            setFieldValue('notifications.discord.level', config.notifications?.discord?.level);
            setFieldValue('notifications.email.enabled', config.notifications?.email?.enabled);
            setFieldValue('notifications.email.smtp_host', config.notifications?.email?.smtp_host);
            setFieldValue('notifications.email.smtp_port', config.notifications?.email?.smtp_port);
            setFieldValue('notifications.email.from', config.notifications?.email?.from);
            setFieldValue('notifications.email.to', config.notifications?.email?.to);
            setFieldValue('notifications.email.username', config.notifications?.email?.username);
            setFieldValue('notifications.email.password', config.notifications?.email?.password);
            setFieldValue('notifications.email.level', config.notifications?.email?.level);

            // 服务器配置
            setFieldValue('server.enable', config.server?.enable);
            setFieldValue('server.port', config.server?.port);
            setFieldValue('server.host', config.server?.host);
        }

        function setFieldValue(name, value) {
            const field = document.getElementById(name);
            if (field && value !== undefined) {
                if (typeof value === 'boolean') {
                    field.value = value.toString();
                } else {
                    field.value = value;
                }
            }
        }

        // 保存配置
        document.getElementById('config-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const config = {
                basic: {
                    app_name: document.getElementById('basic.app_name').value,
                    env: document.getElementById('basic.env').value,
                    log_level: document.getElementById('basic.log_level').value,
                    log_file: document.getElementById('basic.log_file').value,
                },
                exchange: {
                    okx: {
                        api_key: document.getElementById('exchange.okx.api_key').value,
                        secret_key: document.getElementById('exchange.okx.secret_key').value,
                        passphrase: document.getElementById('exchange.okx.passphrase').value,
                        base_url: document.getElementById('exchange.okx.base_url').value,
                        ws_url: document.getElementById('exchange.okx.ws_url').value,
                        timeout: document.getElementById('exchange.okx.timeout').value,
                        retry_count: parseInt(document.getElementById('exchange.okx.retry_count').value) || 0,
                    }
                },
                risk: {
                    enable: document.getElementById('risk.enable').value === 'true',
                    max_position_size: parseFloat(document.getElementById('risk.max_position_size').value) || 0,
                    max_daily_loss: parseFloat(document.getElementById('risk.max_daily_loss').value) || 0,
                    max_drawdown: parseFloat(document.getElementById('risk.max_drawdown').value) || 0,
                    stop_loss_percent: parseFloat(document.getElementById('risk.stop_loss_percent').value) || 0,
                    take_profit_percent: parseFloat(document.getElementById('risk.take_profit_percent').value) || 0,
                    max_trades_per_day: parseInt(document.getElementById('risk.max_trades_per_day').value) || 0,
                },
                strategy: {
                    enable: document.getElementById('strategy.enable').value === 'true',
                    name: document.getElementById('strategy.name').value,
                    params: JSON.parse(document.getElementById('strategy.params').value || '{}'),
                },
                notifications: {
                    enabled: document.getElementById('notifications.enabled').value === 'true',
                    default_level: document.getElementById('notifications.default_level').value,
                    console: {
                        enabled: document.getElementById('notifications.console.enabled').value === 'true',
                        level: document.getElementById('notifications.console.level').value,
                    },
                    telegram: {
                        enabled: document.getElementById('notifications.telegram.enabled').value === 'true',
                        bot_token: document.getElementById('notifications.telegram.bot_token').value,
                        chat_id: document.getElementById('notifications.telegram.chat_id').value,
                        level: document.getElementById('notifications.telegram.level').value,
                    },
                    discord: {
                        enabled: document.getElementById('notifications.discord.enabled').value === 'true',
                        webhook_url: document.getElementById('notifications.discord.webhook_url').value,
                        level: document.getElementById('notifications.discord.level').value,
                    },
                    email: {
                        enabled: document.getElementById('notifications.email.enabled').value === 'true',
                        smtp_host: document.getElementById('notifications.email.smtp_host').value,
                        smtp_port: parseInt(document.getElementById('notifications.email.smtp_port').value) || 0,
                        from: document.getElementById('notifications.email.from').value,
                        to: document.getElementById('notifications.email.to').value,
                        username: document.getElementById('notifications.email.username').value,
                        password: document.getElementById('notifications.email.password').value,
                        level: document.getElementById('notifications.email.level').value,
                    },
                },
                server: {
                    enable: document.getElementById('server.enable').value === 'true',
                    port: parseInt(document.getElementById('server.port').value) || 8765,
                    host: document.getElementById('server.host').value,
                }
            };

            try {
                const response = await fetch('/api/config', {
                    method: 'POST',
                    headers: buildAuthHeaders({ 'Content-Type': 'application/json' }),
                    body: JSON.stringify(config)
                });
                
                if (!response.ok) {
                    if (response.status === 403) {
                        showAlert('访问被拒绝，请检查API Token', 'error');
                        return;
                    }
                    throw new Error('HTTP ' + response.status);
                }
                
                const result = await response.json();
                if (result.status === 'success') {
                    showAlert('配置已保存，重启后生效', 'success');
                } else {
                    showAlert('保存失败: ' + (result.message || '未知错误'), 'error');
                }
            } catch (error) {
                showAlert('保存配置失败: ' + error.message, 'error');
            }
        });

        // 显示提示
        function showAlert(message, type) {
            const alert = document.getElementById('alert');
            alert.textContent = message;
            alert.className = 'alert alert-' + type;
            alert.style.display = 'block';
            
            setTimeout(() => {
                alert.style.display = 'none';
            }, 5000);
        }

        // 页面加载时获取配置
        document.addEventListener('DOMContentLoaded', loadConfig);
    </script>
</body>
</html>
