# OKX量化交易系统 - 实盘配置
# 警告: 此配置用于实盘交易，将使用真实资金!

# 基本配置
basic:
  app_name: "okx-quant"
  env: "production"
  log_level: "info"
  log_file: "./logs/okx-quant-prod.log"

# 交易所配置
exchange:
  okx:
    api_key: "${OKX_API_KEY}"
    secret_key: "${OKX_SECRET_KEY}"
    passphrase: "${OKX_PASSPHRASE}"
    base_url: "https://www.okx.com"
    ws_url: "wss://ws.okx.com:8443/ws/v5/public"
    timeout: 30s
    retry_count: 3
    simulated: false  # 实盘模式 - 真实资金!

# 风险管理配置 - 实盘更保守
risk:
  enable: true
  max_position_size: 5000       # 更保守
  max_daily_loss: 500           # 更保守
  max_drawdown: 0.05            # 更保守
  stop_loss_percent: 0.02       # 更保守
  take_profit_percent: 0.05
  max_trades_per_day: 50        # 更保守

execution:
  enable_strategy_take_profit: true
  persistence:
    enabled: true
    directory: "./data/runtime"
    snapshot_interval: 30s
  smart_routing:
    order_book_depth: 20
    max_estimated_slippage: 0.001  # 更严格的滑点要求
  rebalance:
    enabled: true
    reduce_only: true
    drift_threshold: 0.05          # 更保守
    use_market_orders: false       # 避免市价单滑点
    max_positions_per_cycle: 1     # 更保守
    circuit_auto_reset: true
    circuit_cooldown: 30m          # 更长的冷却时间
  allocator:
    min_weight: 0.1
    max_weight: 0.5                # 更保守
    weight_change_threshold: 0.1   # 更保守
    cooldown_duration: 48h         # 更长的冷却时间
    rebalance_interval: 8h         # 更长的再平衡间隔
    portfolio_loss_limit: 0.03     # 更保守

# 回测配置 - 实盘禁用
backtest:
  enable: false
  initial_balance: 10000
  data_dir: "./data"
  result_dir: "./results"

# 监控配置
monitoring:
  enable: true
  check_interval: 30s
  alert_threshold:
    max_drawdown: 0.08             # 更严格
    max_loss: 800                  # 更严格
    position_limit: 8000           # 更严格
    order_timeout: 3m              # 更短的超时
  metrics:
    enable: true
    push_gateway_url: ""
  alert:
    enable: true
    channels:
      - "console"
      - "webhook"
    webhook_url: "${ALERT_WEBHOOK_URL}"
    dedup_window: 30s
    min_interval: 10s

# 策略配置
strategy:
  enable: true
  name: "production_strategy"
  default_symbol: "BTC-USDT"
  default_bar_interval: "1m"
  params:
    param1: 1
    param2: 2
  delta_neutral:
    fund_usage_percent: 0.8        # 更保守
    rebalance_threshold: 0.015     # 更保守
    basis_circuit_breaker: 0.008   # 更保守
    target_hedge_ratio: 1.0
    hedge_ratio_tolerance: 0.03    # 更保守
    daily_loss_limit: 0.015        # 更保守
    margin_buffer_percent: 0.15    # 更大的缓冲
    settlement_window_before: 30m
    settlement_window_after: 30m
  smart_filter:
    source: "cryptoquant"
    cryptoquant:
      api_key: "${CRYPTOQUANT_API_KEY}"
      asset: "btc"
      assets:
        - "btc"
        - "eth"
  trend_following:
    ema_short_period: 12
    ema_long_period: 26
    adx_period: 14
    adx_threshold: 30.0            # 更严格的趋势确认
    trend_strength: 0.03           # 更保守
    stop_loss_percent: 0.03        # 更严格的止损
    trailing_stop_percent: 0.02
    signal_cooldown: 7200          # 更长的冷却
  mean_reversion:
    rsi_period: 14
    rsi_overbought: 75.0           # 更严格
    rsi_oversold: 25.0             # 更严格
    bb_period: 20
    bb_std_dev: 2.5                # 更宽的布林带
    threshold: 0.03                # 更保守
    stop_loss_percent: 0.03
    trailing_stop_percent: 0.02
    signal_cooldown: 7200
  volatility_breakout:
    atr_period: 14
    volume_ma_period: 20
    breakout_multiplier: 2.0       # 更严格的突破确认
    min_volume_ratio: 1.5          # 更高的成交量要求
    max_holding_bars: 8            # 更短的持仓
    stop_loss_percent: 0.025
    trailing_stop_percent: 0.015
    signal_cooldown: 7200

# 服务器配置
server:
  enable: true
  port: 8765
  host: "127.0.0.1"                # 仅本地访问

# 数据库配置
database:
  enable: true
  type: "sqlite"
  path: "./data/quant-prod.db"

# 手动交易配置
manual_trading:
  enable: false                    # 实盘禁用手动交易
  risk_check: true
  order_confirmation: true

# 大模型配置
llm:
  enable: false                    # 实盘禁用LLM分析
  provider: "openai"
  providers:
    openai:
      api_key: "${OPENAI_API_KEY}"
      base_url: "https://api.openai.com/v1"
      model: "gpt-4"
      temperature: 0.7
      max_tokens: 2000
    claude:
      api_key: "${CLAUDE_API_KEY}"
      base_url: "https://api.anthropic.com"
      model: "claude-3-opus-20240229"
      temperature: 0.7
      max_tokens: 2000
    qwen:
      api_key: "${QWEN_API_KEY}"
      base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
      model: "qwen-max"
      temperature: 0.7
      max_tokens: 2000
  timeout: 30s

# 数据采集配置
data_collector:
  news:
    enable: true
    sources:
      - "cryptopanic"
      - "coindesk"
    refresh_interval: 5m
  economic:
    enable: true
    refresh_interval: 1h

# 提醒服务配置
alert:
  enable: true
  channels:
    - "web"
    - "webhook"
  price_change_threshold: 0.03     # 更敏感的价格变动提醒
  check_interval: 30s              # 更频繁的检查